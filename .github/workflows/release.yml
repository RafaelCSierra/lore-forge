name: Release Module

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync version into module.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Build module.zip
        run: |
          zip -r module.zip . \
            -x ".git/*" ".github/*" ".gitignore" ".gitattributes" \
               "*.zip" "node_modules/*" ".vscode/*" ".idea/*" \
               "CLAUDE.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            module.json
            module.zip
          generate_release_notes: true
